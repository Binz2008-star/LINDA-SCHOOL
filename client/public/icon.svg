<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="star" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>
  <!-- Book base -->
  <rect x="110" y="160" width="292" height="210" rx="18" fill="#fff" opacity="0.95"/>
  <!-- Book spine -->
  <rect x="247" y="160" width="18" height="210" fill="#e0e7ff" rx="4"/>
  <!-- Left page lines -->
  <rect x="135" y="200" width="95" height="10" rx="5" fill="#a5b4fc"/>
  <rect x="135" y="224" width="78" height="10" rx="5" fill="#a5b4fc"/>
  <rect x="135" y="248" width="88" height="10" rx="5" fill="#a5b4fc"/>
  <rect x="135" y="272" width="65" height="10" rx="5" fill="#a5b4fc"/>
  <rect x="135" y="296" width="82" height="10" rx="5" fill="#a5b4fc"/>
  <rect x="135" y="320" width="72" height="10" rx="5" fill="#a5b4fc"/>
  <!-- Right page lines -->
  <rect x="282" y="200" width="95" height="10" rx="5" fill="#c4b5fd"/>
  <rect x="282" y="224" width="78" height="10" rx="5" fill="#c4b5fd"/>
  <rect x="282" y="248" width="88" height="10" rx="5" fill="#c4b5fd"/>
  <rect x="282" y="272" width="65" height="10" rx="5" fill="#c4b5fd"/>
  <rect x="282" y="296" width="82" height="10" rx="5" fill="#c4b5fd"/>
  <rect x="282" y="320" width="72" height="10" rx="5" fill="#c4b5fd"/>
  <!-- Star badge -->
  <circle cx="380" cy="152" r="54" fill="url(#star)"/>
  <text x="380" y="168" text-anchor="middle" font-size="52" font-family="Arial">🎓</text>
  <!-- 4 dots for 4 kids -->
  <circle cx="185" cy="390" r="14" fill="#f472b6"/>
  <circle cx="225" cy="390" r="14" fill="#60a5fa"/>
  <circle cx="265" cy="390" r="14" fill="#34d399"/>
  <circle cx="305" cy="390" r="14" fill="#fb923c"/>
</svg>
