name: Validate voice reflection

on:
  push:
    branches:
      - feat/voice-portfolio-lab
    paths:
      - client/src/components/VoiceReflection.tsx
      - client/src/components/LessonActivityStudio.tsx
      - scripts/apply-voice-reflection.mjs
      - .github/workflows/voice-reflection-check.yml
  pull_request:
    branches:
      - main

permissions:
  contents: write
  pull-requests: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: feat/voice-portfolio-lab
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable pnpm
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply voice reflection patch
        run: node scripts/apply-voice-reflection.mjs

      - name: Type-check
        id: typecheck
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          pnpm check 2>&1 | tee voice-typecheck.txt

      - name: Upload diagnostics
        if: steps.typecheck.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: voice-reflection-typecheck
          path: voice-typecheck.txt
          retention-days: 2

      - name: Stop after TypeScript errors
        if: steps.typecheck.outcome == 'failure'
        run: exit 1

      - name: Build
        run: pnpm build

      - name: Commit integration
        run: |
          if git diff --quiet; then
            echo "No integration change required."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add client/src/components/LessonActivityStudio.tsx
          git commit -m "feat: add voice reflection to lesson studio [skip ci]"
          git push origin HEAD:feat/voice-portfolio-lab
