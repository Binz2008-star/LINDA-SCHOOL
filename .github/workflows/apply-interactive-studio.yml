name: Apply interactive school flow

on:
  push:
    branches:
      - feat/interactive-learning-studio
    paths:
      - scripts/apply-interactive-studio.mjs
      - client/src/components/LessonActivityStudio.tsx
      - client/src/hooks/useSpeech.ts
      - client/src/lib/children.ts
      - api/tutor.js
      - api/tts.js
      - .github/workflows/apply-interactive-studio.yml
  pull_request:
    branches:
      - main
    paths:
      - scripts/apply-interactive-studio.mjs
      - client/src/components/LessonActivityStudio.tsx
      - client/src/hooks/useSpeech.ts
      - client/src/lib/children.ts
      - api/tutor.js
      - api/tts.js
      - .github/workflows/apply-interactive-studio.yml

permissions:
  contents: write
  pull-requests: read

jobs:
  apply-and-check:
    runs-on: ubuntu-latest
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: feat/interactive-learning-studio
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable pnpm
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply lesson flow patch
        run: node scripts/apply-interactive-studio.mjs

      - name: Type-check
        id: typecheck
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          pnpm check 2>&1 | tee typecheck-errors.txt

      - name: Upload TypeScript diagnostics
        if: steps.typecheck.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: interactive-studio-typecheck
          path: typecheck-errors.txt
          retention-days: 2

      - name: Stop after TypeScript errors
        if: steps.typecheck.outcome == 'failure'
        run: exit 1

      - name: Build
        run: pnpm build

      - name: Commit patched lesson flow
        run: |
          if git diff --quiet; then
            echo "No generated patch changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add client/src/pages/SecureFamilySchool.tsx
          git commit -m "feat: make hands-on studio part of every lesson [skip ci]"
          git push origin HEAD:feat/interactive-learning-studio
