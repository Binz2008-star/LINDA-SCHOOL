name: Validate grade upgrade

on:
  push:
    branches:
      - feat/real-grade-curriculum

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/real-grade-curriculum
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - name: Apply grade upgrade
        run: node scripts/apply-grade-upgrade.mjs
      - name: Type-check
        run: pnpm check
      - name: Build
        run: pnpm build
      - name: Verify grade values and lesson count
        run: |
          grep -q "grade: 7" client/src/lib/familyCurriculum.ts
          test "$(grep -c "grade: 5" client/src/lib/familyCurriculum.ts)" -eq 2
          grep -q "grade: 3" client/src/lib/familyCurriculum.ts
          test "$(grep -c "id: 'grade" client/src/lib/gradeCurriculum.ts)" -eq 12
      - name: Commit integrated files
        run: |
          if git diff --quiet; then exit 0; fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add client/src/lib/familyCurriculum.ts client/src/lib/children.ts client/src/components/ChildSelector.tsx
          git commit -m "feat: align accounts and curriculum to real grades [skip ci]"
          git push origin HEAD:feat/real-grade-curriculum
